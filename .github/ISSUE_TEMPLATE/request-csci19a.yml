name: Request a CSCI19A repo
description: Get your personal repo for a CSCI19A assignment. Register first if you have not.
title: "request-csci19a: "
body:
  - type: markdown
    attributes:
      value: |
        ### Request your CSCI19A assignment repo
        Pick the assignment. Your GitHub username is captured automatically.
        Not registered yet? Open the **Register** form first.
  - type: dropdown
    id: assignment
    attributes:
      label: Assignment
      description: (Auto-generated from config.json — do not hand-edit.)
      options:
        - W34
        - W35
        - A21
        - A22
        - A23
        - A24
        - A251
        - A252
        - A27
        - A26
        - A28
        - A31
        - A32
        - A35
        - A36
        - A33
        - A34
        - A37
        - Q5Q1
        - Q5Q3
        - Q5Q2
        - A50
        - A51
        - A52
        - A53
        - A54
        - A55
        - A56
        - A57
        - A58
        - A59
        - A510
        - A511
    validations:
      required: true
